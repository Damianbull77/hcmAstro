name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  # --- ESTO ES LO NUEVO: Permite el disparo desde Google Sheets ---
  repository_dispatch:
    types: [webhook_deploy]
  # ----------------------------------------------------------------

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Instalamos y buildeamos solo Astro
      # Aquí es donde Astro llama a tu API para generar las páginas estáticas
      - run: npm ci && npm run build
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HCM2_99B6C }}
          channelId: live
          projectId: hcm2-99b6c
          # Como bien dijiste, esto asegura que SOLO se toque el Hosting:
          targets: hosting
